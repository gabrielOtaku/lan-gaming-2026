  <path d="M240 140 A 60 60 0 1 0 240 260" fill="none" stroke="url(#grad-gold)" stroke-width="20" stroke-linecap="round"/>
  
  <circle cx="240" cy="140" r="15" fill="#c21f1f"/>
  <circle cx="240" cy="260" r="15" fill="#c21f1f"/>
  <circle cx="140" cy="200" r="18" fill="#d4af37"/>
  
  <line x1="140" y1="200" x2="240" y2="140" stroke="#d4af37" stroke-width="4"/>
  <line x1="140" y1="200" x2="240" y2="260" stroke="#d4af37" stroke-width="4"/>
  
  <path d="M200 160 L210 190 L240 200 L210 210 L200 240 L190 210 L160 200 L190 190 Z" fill="#ffffff" filter="url(#glow-gold)"/>
