<svg viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow-gold" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-red" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <linearGradient id="grad-gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8e7a2" />
      <stop offset="50%" stop-color="#d4af37" />
      <stop offset="100%" stop-color="#8a6d1c" />
    </linearGradient>
  </defs>

  <path d="M200 20 L350 70 V220 C350 310 200 380 200 380 C200 380 50 310 50 220 V70 L200 20 Z" fill="#0a0a0a" stroke="#d4af37" stroke-width="8" filter="url(#glow-gold)"/>
  
